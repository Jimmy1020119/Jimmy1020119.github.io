<!-- Google Slides CSP -->
<meta http-equiv="Content-Security-Policy"
  content="frame-src https://docs.google.com https://slides.google.com 'self';">

<script>
(function () {
  var NS = "jimmy1020119-github-io";

  function fmt(n) {
    if (n == null || isNaN(n)) return "—";
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000)    return (n / 1000).toFixed(1) + "K";
    return n.toLocaleString();
  }

  function injectViews() {
    if (document.getElementById("sp-total-views")) return;
    var bottom = document.querySelector("#sidebar .sidebar-bottom");
    if (!bottom) return;

    var bar = document.createElement("div");
    bar.id = "sp-total-views";
    bar.style.cssText =
      "display:flex;align-items:center;gap:5px;width:100%;" +
      "padding:8px 16px;font-size:0.82rem;opacity:0.7;";
    bar.innerHTML =
      '<i class="fas fa-eye"></i>' +
      '<span>Total</span>' +
      '<span id="sp-views-count" style="font-weight:700">—</span>' +
      '<span>views</span>';

    bottom.parentNode.insertBefore(bar, bottom);

    fetch("https://api.counterapi.dev/v1/" + NS + "/pageviews/up", { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var el = document.getElementById("sp-views-count");
        if (el) el.textContent = fmt(d && d.count != null ? d.count : null);
      })
      .catch(function() {});
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", injectViews);
  } else {
    injectViews();
  }
})();
</script>
