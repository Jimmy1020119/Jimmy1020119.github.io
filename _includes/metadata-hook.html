<!-- Google Slides iframe CSP -->
<meta http-equiv="Content-Security-Policy"
  content="frame-src https://docs.google.com https://slides.google.com 'self';">

<!-- Spotify-style: stats bar + theme toggle injection -->
<script>
(function () {
  var NS = "jimmy1020119-github-io";

  function fmt(n) {
    if (n == null) return "—";
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000)    return (n / 1000).toFixed(1) + "K";
    return String(n);
  }

  function apiUp(key) {
    return fetch("https://api.counterapi.dev/v1/" + NS + "/" + key + "/up", { cache: "no-store" })
      .then(function(r){ return r.json(); })
      .then(function(d){ return d.count != null ? d.count : null; })
      .catch(function(){ return null; });
  }

  function apiGet(key) {
    return fetch("https://api.counterapi.dev/v1/" + NS + "/" + key, { cache: "no-store" })
      .then(function(r){ return r.json(); })
      .then(function(d){ return d.count != null ? d.count : null; })
      .catch(function(){ return null; });
  }

  function injectStats() {
    var sidebar = document.getElementById("sidebar");
    if (!sidebar || document.getElementById("sp-stats-bar")) return;

    var bar = document.createElement("div");
    bar.id = "sp-stats-bar";
    bar.innerHTML =
      '<div class="sp-stat">' +
        '<span class="sp-stat-value" id="sp-views">—</span>' +
        '<span class="sp-stat-label">Views</span>' +
      '</div>' +
      '<div class="sp-stat">' +
        '<span class="sp-stat-value" id="sp-visitors">—</span>' +
        '<span class="sp-stat-label">Visitors</span>' +
      '</div>' +
      '<div class="sp-stat">' +
        '<span class="sp-stat-value" id="sp-posts">—</span>' +
        '<span class="sp-stat-label">Posts</span>' +
      '</div>';

    var nav = sidebar.querySelector("nav");
    nav ? sidebar.insertBefore(bar, nav) : sidebar.prepend(bar);
  }

  function injectToggle() {
    if (document.getElementById("sp-theme-toggle")) return;

    var html = document.documentElement;
    var media = window.matchMedia("(prefers-color-scheme: dark)");

    function apply(mode) {
      if (mode === "light") {
        html.setAttribute("data-mode", "light");
      } else if (mode === "dark") {
        html.setAttribute("data-mode", "dark");
      } else { // system
        html.setAttribute("data-mode", media.matches ? "dark" : "light");
      }
    }

    function current() {
      try { return localStorage.getItem("mode") || "system"; } catch (e) { return "system"; }
    }

    function setMode(mode) {
      try {
        if (mode === "system") localStorage.removeItem("mode");
        else localStorage.setItem("mode", mode);
      } catch (e) {}
      apply(mode);
      render();
    }

    var wrap = document.createElement("div");
    wrap.id = "sp-theme-toggle";
    wrap.setAttribute("role", "group");
    wrap.setAttribute("aria-label", "Theme");

    var modes = [
      { key: "system", icon: "fa-desktop", label: "System" },
      { key: "light",  icon: "fa-sun",     label: "Light"  },
      { key: "dark",   icon: "fa-moon",    label: "Dark"   }
    ];

    var btns = {};
    modes.forEach(function (m) {
      var b = document.createElement("button");
      b.type = "button";
      b.className = "sp-seg";
      b.title = m.label;
      b.setAttribute("aria-label", m.label);
      b.innerHTML = '<i class="fas ' + m.icon + '"></i>';
      b.addEventListener("click", function () { setMode(m.key); });
      wrap.appendChild(b);
      btns[m.key] = b;
    });

    function render() {
      var cur = current();
      modes.forEach(function (m) {
        btns[m.key].classList.toggle("active", m.key === cur);
      });
    }

    media.addEventListener("change", function () {
      if (current() === "system") apply("system");
    });

    document.body.appendChild(wrap);
    render();
  }

  function loadStats() {
    apiUp("pageviews").then(function(v) {
      var el = document.getElementById("sp-views");
      if (el) el.textContent = fmt(v);
    });

    var COOKIE = "sp_visited";
    var isNew = !document.cookie.split(";").some(function(c) {
      return c.trim().indexOf(COOKIE) === 0;
    });

    (isNew ? apiUp("visitors") : apiGet("visitors")).then(function(v) {
      if (isNew) {
        var exp = new Date(Date.now() + 86400000).toUTCString();
        document.cookie = COOKIE + "=1; expires=" + exp + "; path=/";
      }
      var el = document.getElementById("sp-visitors");
      if (el) el.textContent = fmt(v);
    });

    var posts = document.querySelectorAll("article.post-preview, li.post-item, .post-preview").length;
    var elP = document.getElementById("sp-posts");
    if (elP && posts > 0) elP.textContent = posts;
  }

  function boot() {
    injectStats();
    injectToggle();
    loadStats();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
