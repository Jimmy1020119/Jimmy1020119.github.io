<!-- Google Slides iframe CSP -->
<meta http-equiv="Content-Security-Policy"
  content="frame-src https://docs.google.com https://slides.google.com 'self';">

<script>
(function () {
  var NS  = "jimmy1020119-github-io";
  var KEY = "pageviews";

  function fmt(n) {
    if (n == null || isNaN(n)) return "—";
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000)    return (n / 1000).toFixed(1) + "K";
    return n.toLocaleString();
  }

  function injectViews() {
    if (document.getElementById("sp-total-views")) return;
    var bottom = document.querySelector("#sidebar .sidebar-bottom");
    if (!bottom) return;

    var bar = document.createElement("div");
    bar.id = "sp-total-views";
    bar.innerHTML =
      '<i class="fas fa-eye" aria-hidden="true"></i>' +
      '<span class="sp-views-label">Total</span>' +
      '<span class="sp-views-count" id="sp-views-count">—</span>' +
      '<span class="sp-views-label">views</span>';

    bottom.parentNode.insertBefore(bar, bottom);

    /* hit counter */
    fetch("https://api.counterapi.dev/v1/" + NS + "/" + KEY + "/up", { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var el = document.getElementById("sp-views-count");
        if (el) el.textContent = fmt(d && d.count != null ? d.count : null);
      })
      .catch(function() {});
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", injectViews);
  } else {
    injectViews();
  }
})();
</script>
