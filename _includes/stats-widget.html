<div id="sp-stats-bar">
  <div class="sp-stat" title="누적 조회수">
    <span class="sp-stat-value" id="sp-views">—</span>
    <span class="sp-stat-label">조회수</span>
  </div>
  <div class="sp-stat" title="누적 방문자">
    <span class="sp-stat-value" id="sp-visitors">—</span>
    <span class="sp-stat-label">방문자</span>
  </div>
  <div class="sp-stat" title="포스트 수">
    <span class="sp-stat-value">{{ site.posts | size }}</span>
    <span class="sp-stat-label">포스트</span>
  </div>
</div>

<script>
(function () {
  const NS = "jimmy1020119-github-io";

  function fmt(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000) return (n / 1000).toFixed(1) + "K";
    return n.toString();
  }

  async function bump(key) {
    try {
      const r = await fetch(
        "https://api.counterapi.dev/v1/" + NS + "/" + key + "/up",
        { cache: "no-store" }
      );
      const d = await r.json();
      return d.count ?? 0;
    } catch { return null; }
  }

  async function get(key) {
    try {
      const r = await fetch(
        "https://api.counterapi.dev/v1/" + NS + "/" + key,
        { cache: "no-store" }
      );
      const d = await r.json();
      return d.count ?? 0;
    } catch { return null; }
  }

  async function init() {
    // 조회수: 매 방문마다 증가
    const views = await bump("pageviews");
    if (views !== null)
      document.getElementById("sp-views").textContent = fmt(views);

    // 방문자: 24h 쿠키 기반 unique 처리
    const COOKIE = "sp_visited";
    const isNew = !document.cookie.split(";").some(c => c.trim().startsWith(COOKIE));
    let visitors;
    if (isNew) {
      visitors = await bump("visitors");
      const exp = new Date(Date.now() + 24 * 60 * 60 * 1000).toUTCString();
      document.cookie = COOKIE + "=1; expires=" + exp + "; path=/";
    } else {
      visitors = await get("visitors");
    }
    if (visitors !== null)
      document.getElementById("sp-visitors").textContent = fmt(visitors);
  }

  init();
})();
</script>
